name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      opencode_version:
        description: 'OpenCode upstream version to build (e.g., 1.1.3)'
        required: true
        default: 'latest'
      release_tag:
        description: 'Release tag name (e.g., v1.1.3-unguarded)'
        required: true

env:
  BUN_VERSION: 'latest'

jobs:
  fetch-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      tag: ${{ steps.get-version.outputs.tag }}
    steps:
      - name: Get OpenCode version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ inputs.opencode_version }}" == "latest" ]; then
              VERSION=$(curl -s https://api.github.com/repos/anomalyco/opencode/releases/latest | jq -r .tag_name | sed 's/^v//')
            else
              VERSION="${{ inputs.opencode_version }}"
            fi
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${{ github.ref_name }}"
            VERSION=$(echo "$TAG" | sed 's/^v//' | sed 's/-unguarded$//')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building OpenCode version: $VERSION with tag: $TAG"

  # Build Linux and Windows versions on Ubuntu
  build-linux:
    needs: fetch-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Dependencies
        run: |
                    bun install

      - name: Build Linux Platforms
        run: |
          cd packages/opencode
          bun run script/build.ts
        env:
          OPENCODE_VERSION: ${{ needs.fetch-version.outputs.version }}
          OPENCODE_CHANNEL: latest

      - name: List Built Files
        run: |
          cd packages/opencode
          find dist -type f -name "opencode*" | head -20

      - name: Upload Linux x64
        uses: actions/upload-artifact@v4
        with:
          name: memfit-linux-x64
          path: packages/opencode/dist/memfit-linux-x64/bin/memfit
          retention-days: 5

      - name: Upload Linux x64 baseline
        uses: actions/upload-artifact@v4
        with:
          name: memfit-linux-x64-baseline
          path: packages/opencode/dist/memfit-linux-x64-baseline/bin/memfit
          retention-days: 5
          if-no-files-found: ignore

      - name: Upload Linux ARM64
        uses: actions/upload-artifact@v4
        with:
          name: memfit-linux-arm64
          path: packages/opencode/dist/memfit-linux-arm64/bin/memfit
          retention-days: 5

      - name: Upload Linux ARM64 musl
        uses: actions/upload-artifact@v4
        with:
          name: memfit-linux-arm64-musl
          path: packages/opencode/dist/memfit-linux-arm64-musl/bin/memfit
          retention-days: 5
          if-no-files-found: ignore

      # Linux cross-compiles all platforms; upload macOS x64 from here
      - name: Upload macOS x64 (cross-compiled)
        uses: actions/upload-artifact@v4
        with:
          name: memfit-darwin-x64
          path: packages/opencode/dist/memfit-darwin-x64/bin/memfit
          retention-days: 5
          if-no-files-found: ignore

  # Build Windows versions on Windows
  build-windows:
    needs: fetch-version
    runs-on: windows-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Dependencies
        run: |
                    bun install
        shell: bash

      - name: Build Windows versions
        run: |
          cd packages/opencode
          bun run script/build.ts --single
        shell: bash
        env:
          OPENCODE_VERSION: ${{ needs.fetch-version.outputs.version }}
          OPENCODE_CHANNEL: latest

      - name: List Built Files
        run: |
          cd packages/opencode
          Get-ChildItem -Recurse dist -Filter "opencode*" | Select-Object -First 20
        shell: pwsh

      - name: Upload Windows x64
        uses: actions/upload-artifact@v4
        with:
          name: memfit-windows-x64
          path: packages/opencode/dist/memfit-windows-x64/bin/memfit.exe
          retention-days: 5

      - name: Upload Windows x64 baseline
        uses: actions/upload-artifact@v4
        with:
          name: memfit-windows-x64-baseline
          path: packages/opencode/dist/memfit-windows-x64-baseline/bin/memfit.exe
          retention-days: 5
          if-no-files-found: ignore

  # Build macOS ARM64 on Apple Silicon
  build-macos:
    needs: fetch-version
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Dependencies
        run: |
                    bun install

      - name: Build macOS ARM64
        run: |
          cd packages/opencode
          bun run script/build.ts
        env:
          OPENCODE_VERSION: ${{ needs.fetch-version.outputs.version }}
          OPENCODE_CHANNEL: latest

      - name: List Built Files
        run: |
          cd packages/opencode
          find dist -type f -name "opencode*" | head -20

      - name: Upload macOS ARM64
        uses: actions/upload-artifact@v4
        with:
          name: memfit-darwin-arm64
          path: packages/opencode/dist/memfit-darwin-arm64/bin/memfit
          retention-days: 5

  # Build Desktop (Tauri) versions
  build-desktop:
    needs: [fetch-version, build-linux, build-macos, build-windows]
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            cli-artifact: memfit-darwin-arm64
            desktop-name: memfit-desktop-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            cli-artifact: memfit-darwin-x64
            desktop-name: memfit-desktop-darwin-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cli-artifact: memfit-windows-x64
            desktop-name: memfit-desktop-windows-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cli-artifact: memfit-linux-x64
            desktop-name: memfit-desktop-linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            cli-artifact: memfit-linux-arm64
            desktop-name: memfit-desktop-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies (Ubuntu)
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # Install create-dmg for DMG bundling
          brew install create-dmg

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
          shared-key: ${{ matrix.target }}

      - name: Install tauri-cli (Ubuntu)
        if: contains(matrix.os, 'ubuntu')
        run: |
          cargo install tauri-cli --version "^2" --force
          cargo tauri --version

      - name: Install dependencies
        run: |
                    bun install
        shell: bash

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.cli-artifact }}
          path: cli-binary

      - name: Prepare sidecar binary
        run: |
          cd packages/desktop
          mkdir -p src-tauri/sidecars
          echo "Contents of cli-binary:"
          find ../../cli-binary -type f
          
          if [ "${{ runner.os }}" == "Windows" ]; then
            BINARY_PATH=$(find ../../cli-binary -type f -name "memfit.exe" | head -1)
            echo "Found Windows binary at: $BINARY_PATH"
            cp "$BINARY_PATH" "src-tauri/sidecars/memfit-cli-${{ matrix.target }}.exe"
          else
            BINARY_PATH=$(find ../../cli-binary -type f -name "memfit" | head -1)
            echo "Found Unix binary at: $BINARY_PATH"
            cp "$BINARY_PATH" "src-tauri/sidecars/memfit-cli-${{ matrix.target }}"
            chmod +x "src-tauri/sidecars/memfit-cli-${{ matrix.target }}"
          fi
          ls -la src-tauri/sidecars/
        shell: bash

      - name: Update Tauri config version
        run: |
          cd packages/desktop
          VERSION="${{ needs.fetch-version.outputs.version }}"
          if [ "${{ runner.os }}" == "Windows" ]; then
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          else
            sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json 2>/dev/null || \
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          fi
        shell: bash

      - name: Disable updater in prod config (no signing key)
        run: |
          cd packages/desktop
          # Create a modified prod config without updater
          cat > src-tauri/tauri.prod.conf.json << 'EOF'
          {
            "$schema": "https://schema.tauri.app/config/2",
            "productName": "MemFit",
            "identifier": "ai.memfit.desktop.unguarded",
            "bundle": {
              "createUpdaterArtifacts": false,
              "icon": [
                "icons/prod/32x32.png",
                "icons/prod/128x128.png",
                "icons/prod/128x128@2x.png",
                "icons/prod/icon.icns",
                "icons/prod/icon.ico"
              ],
              "windows": {
                "nsis": {
                  "installerIcon": "icons/prod/icon.ico"
                }
              }
            }
          }
          EOF
          cat src-tauri/tauri.prod.conf.json
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/desktop
          tauriScript: ${{ contains(matrix.os, 'ubuntu') && 'cargo tauri' || '' }}
          args: --target ${{ matrix.target }} --config src-tauri/tauri.prod.conf.json

      - name: Upload Desktop artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.desktop-name }}
          path: |
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          retention-days: 5
          if-no-files-found: ignore

      - name: Upload Desktop artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.desktop-name }}
          path: |
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          retention-days: 5
          if-no-files-found: ignore

      - name: Upload Desktop artifacts (Linux)
        if: contains(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.desktop-name }}
          path: |
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          retention-days: 5
          if-no-files-found: ignore

  release:
    needs: [fetch-version, build-linux, build-macos, build-windows, build-desktop]
    if: always() && needs.build-linux.result == 'success' && needs.build-macos.result == 'success' && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Files
        run: |
          mkdir -p release

          # Show what was downloaded
          echo "Downloaded artifacts:"
          find artifacts -type f | head -50

          # Rename and organize CLI files
          for dir in artifacts/*/; do
            dirname=$(basename "$dir")

            # Handle CLI artifacts (files directly in directory)
            for file in "$dir"*; do
              if [ -f "$file" ]; then
                case "$dirname" in
                  memfit-linux-x64)
                    cp "$file" "release/memfit-linux-x64"
                    ;;
                  memfit-linux-x64-baseline)
                    cp "$file" "release/memfit-linux-x64-baseline"
                    ;;
                  memfit-linux-arm64)
                    cp "$file" "release/memfit-linux-arm64"
                    ;;
                  memfit-linux-arm64-musl)
                    cp "$file" "release/memfit-linux-arm64-musl"
                    ;;
                  memfit-darwin-arm64)
                    cp "$file" "release/memfit-darwin-arm64"
                    ;;
                  memfit-darwin-x64)
                    cp "$file" "release/memfit-darwin-x64"
                    ;;
                  memfit-windows-x64)
                    cp "$file" "release/memfit-windows-x64.exe"
                    ;;
                  memfit-windows-x64-baseline)
                    cp "$file" "release/memfit-windows-x64-baseline.exe"
                    ;;
                esac
              fi
            done

            # Handle Desktop artifacts (files in nested directories)
            if [[ "$dirname" == memfit-desktop-* ]]; then
              # Find and copy DMG files (macOS)
              find "$dir" -name "*.dmg" -type f | while read -r file; do
                filename=$(basename "$file")
                echo "Copying DMG: $filename"
                cp "$file" "release/$filename"
              done

              # Find and copy MSI files (Windows)
              find "$dir" -name "*.msi" -type f | while read -r file; do
                filename=$(basename "$file")
                echo "Copying MSI: $filename"
                cp "$file" "release/$filename"
              done

              # Find and copy NSIS exe files (Windows installer)
              find "$dir" -path "*/nsis/*.exe" -type f | while read -r file; do
                filename=$(basename "$file")
                echo "Copying NSIS EXE: $filename"
                cp "$file" "release/$filename"
              done

              # Find and copy deb files (Linux)
              find "$dir" -name "*.deb" -type f | while read -r file; do
                filename=$(basename "$file")
                echo "Copying DEB: $filename"
                cp "$file" "release/$filename"
              done
            fi
          done

          chmod +x release/opencode-* 2>/dev/null || true
          echo ""
          echo "Final release files:"
          ls -la release/

      - name: Generate Checksums
        run: |
          cd release
          sha256sum * > checksums.sha256
          cat checksums.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.fetch-version.outputs.tag }}
          name: OpenCode Unguarded ${{ needs.fetch-version.outputs.tag }}
          body: |
            ## OpenCode Unguarded Release

            Based on [anomalyco/opencode](https://github.com/anomalyco/opencode) version `${{ needs.fetch-version.outputs.version }}`

            ### Changes from Upstream
            - Removed LLM guardrails/ethics fences from system prompts
            - Removed malicious code refusal instructions
            - Removed defensive-only security restrictions

            ### CLI Downloads

            | Platform | Architecture | File |
            |----------|--------------|------|
            | Linux | x64 | `memfit-linux-x64` |
            | Linux | x64 (baseline) | `memfit-linux-x64-baseline` |
            | Linux | ARM64 | `memfit-linux-arm64` |
            | macOS | Apple Silicon | `memfit-darwin-arm64` |
            | macOS | Intel | `memfit-darwin-x64` |
            | Windows | x64 | `memfit-windows-x64.exe` |

            ### Desktop App Downloads

            | Platform | Architecture | File |
            |----------|--------------|------|
            | macOS | Apple Silicon | `.dmg` |
            | macOS | Intel | `.dmg` |
            | Windows | x64 | `.msi` / `.exe` |
            | Linux | x64 | `.deb` |
            | Linux | ARM64 | `.deb` |

            #### macOS: Running Unsigned App

            The macOS desktop app is not code-signed. To run it:

            **Method 1: Remove quarantine attribute (Recommended)**
            ```bash
            xattr -cr /Applications/OpenCode.app
            ```

            **Method 2: Ad-hoc signing**
            ```bash
            codesign --force --deep --sign - /Applications/OpenCode.app
            ```

            **Method 3: System Preferences**
            - Try to open the app → Go to System Preferences → Security & Privacy → General → Click "Open Anyway"

            ### Quick Install (CLI)

            ```bash
            # macOS Apple Silicon
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ needs.fetch-version.outputs.tag }}/memfit-darwin-arm64 -o /usr/local/bin/memfit && chmod +x /usr/local/bin/memfit

            # macOS Intel
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ needs.fetch-version.outputs.tag }}/memfit-darwin-x64 -o /usr/local/bin/memfit && chmod +x /usr/local/bin/memfit

            # Linux x64
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ needs.fetch-version.outputs.tag }}/memfit-linux-x64 -o /usr/local/bin/memfit && chmod +x /usr/local/bin/memfit

            # Linux ARM64
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ needs.fetch-version.outputs.tag }}/memfit-linux-arm64 -o /usr/local/bin/memfit && chmod +x /usr/local/bin/memfit
            ```

            ### Verification

            ```bash
            sha256sum -c checksums.sha256
            ```

            ---

            **Disclaimer**: This is for educational and research purposes only.
          files: |
            release/*
          draft: false
          prerelease: false
